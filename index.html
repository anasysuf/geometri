      <div class="mt-7 flex flex-wrap justify-center gap-3"><button id="retry-quiz" data-template-id="retry-quiz" type="button" class="canva-button raised inline-flex min-h-14 items-center justify-center gap-2 rounded-2xl px-7 py-3 font-extrabold"><i data-lucide="rotate-ccw" class="h-5 w-5" aria-hidden="true"></i></button> <button id="back-to-learn" data-template-id="back-to-learn" type="button" class="canva-button inline-flex min-h-14 items-center justify-center gap-2 rounded-2xl border-2 border-slate-200 bg-white px-7 py-3 font-extrabold"><i data-lucide="book-open" class="h-5 w-5" aria-hidden="true"></i></button>
      </div>
     </div>
    </section>
   </main>
   <footer data-template-id="footer-section" class="canva-footer mt-8 border-t border-slate-200 bg-white/80">
    <div class="mx-auto w-full max-w-6xl px-4 py-6 text-center sm:px-7">
     <p data-template-id="footer-title" class="canva-text font-extrabold"></p>
     <p data-template-id="footer-copy" class="canva-text mt-1"></p>
    </div>
   </footer>
  </div>
  <script>
  const TOTAL_QUESTIONS = 10;
  let questionIndex = 0;
  let correctAnswers = 0;
  let answered = false;

  const learnStage = document.getElementById("learn-stage");
  const quizStage = document.getElementById("quiz-stage");
  const resultStage = document.getElementById("result-stage");
  const learnMenuButton = document.getElementById("learn-menu-button");
  const quizMenuButton = document.getElementById("quiz-menu-button");
  const cards = [...document.querySelectorAll(".question-card")];
  const progressBar = document.getElementById("quiz-progress");
  const progressTrack = progressBar.parentElement;
  const counter = document.getElementById("question-counter");
  const nextButton = document.getElementById("next-question");
  const finishButton = document.getElementById("finish-quiz");

  function focusHeading(id) {
    const heading = document.getElementById(id);
    heading.setAttribute("tabindex", "-1");
    heading.focus({preventScroll:true});
  }

  function updateMenu(active) {
    const learning = active === "learn";
    learnMenuButton.classList.toggle("is-active", learning);
    quizMenuButton.classList.toggle("is-active", !learning);
    learnMenuButton.setAttribute("aria-pressed", String(learning));
    quizMenuButton.setAttribute("aria-pressed", String(!learning));
  }

  function showLearn(moveFocus = true) {
    learnStage.classList.remove("hidden");
    quizStage.classList.add("hidden");
    resultStage.classList.add("hidden");
    updateMenu("learn");
    if (moveFocus) focusHeading("learn-title");
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function showQuiz(reset = false, moveFocus = true) {
    if (reset) resetQuizState();
    learnStage.classList.add("hidden");
    resultStage.classList.add("hidden");
    quizStage.classList.remove("hidden");
    updateMenu("quiz");
    if (moveFocus) focusHeading("quiz-title");
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function setActionButton(button, visible) {
    button.classList.toggle("hidden", !visible);
    button.classList.toggle("flex", visible);
  }

  function selectAnswer(card, button) {
    if (answered || Number(card.dataset.questionIndex) !== questionIndex) return;
    answered = true;
    const isCorrect = button.dataset.answer === card.dataset.correct;

    card.querySelectorAll(".quiz-option").forEach(option => {
      option.disabled = true;
      if (option.dataset.answer === card.dataset.correct) option.classList.add("is-correct");
    });

    if (isCorrect) correctAnswers += 1;
    else button.classList.add("is-wrong");

    const feedback = card.querySelector(".feedback");
    feedback.classList.remove("hidden");
    feedback.classList.add(
      isCorrect ? "border-[#bee8d5]" : "border-[#ffd5d1]",
      isCorrect ? "bg-[#e9f8f1]" : "bg-[#fff0ee]"
    );
    card.querySelector(".correct-message").classList.toggle("hidden", !isCorrect);
    card.querySelector(".wrong-message").classList.toggle("hidden", isCorrect);
    setActionButton(nextButton, questionIndex < TOTAL_QUESTIONS - 1);
    setActionButton(finishButton, questionIndex === TOTAL_QUESTIONS - 1);
  }

  function displayQuestion(index, moveFocus = true) {
    questionIndex = index;
    answered = false;
    cards.forEach((card, cardIndex) => card.classList.toggle("hidden", cardIndex !== index));
    counter.textContent = `Soal ${index + 1} dari ${TOTAL_QUESTIONS}`;
    progressBar.style.width = `${((index + 1) / TOTAL_QUESTIONS) * 100}%`;
    progressTrack.setAttribute("aria-valuenow", String(index + 1));
    setActionButton(nextButton, false);
    setActionButton(finishButton, false);

    if (moveFocus) {
      const heading = cards[index].querySelector("h2");
      heading.setAttribute("tabindex", "-1");
      heading.focus({preventScroll:true});
      cards[index].scrollIntoView({behavior:"smooth",block:"center"});
    }
  }

  function resetQuizState() {
    questionIndex = 0;
    correctAnswers = 0;
    answered = false;
    cards.forEach((card, index) => {
      card.classList.toggle("hidden", index !== 0);
      card.querySelectorAll(".quiz-option").forEach(option => {
        option.disabled = false;
        option.classList.remove("is-correct", "is-wrong");
      });
      const feedback = card.querySelector(".feedback");
      feedback.className = "feedback mt-4 hidden rounded-2xl border px-4 py-3 font-bold";
      card.querySelector(".correct-message").classList.add("hidden");
      card.querySelector(".wrong-message").classList.add("hidden");
    });
    displayQuestion(0, false);
  }

  function showResult() {
    if (!answered) return;
    const score = Math.round((correctAnswers / TOTAL_QUESTIONS) * 100);
    document.getElementById("result-score").textContent = String(score);
    document.getElementById("result-summary").textContent = `${correctAnswers} jawaban benar dari ${TOTAL_QUESTIONS} soal`;
    quizStage.classList.add("hidden");
    learnStage.classList.add("hidden");
    resultStage.classList.remove("hidden");
    updateMenu("quiz");
    focusHeading("result-title");
    window.scrollTo({top:0,behavior:"smooth"});
  }

  cards.forEach(card => {
    card.querySelectorAll(".quiz-option").forEach(button => {
      button.addEventListener("click", () => selectAnswer(card, button));
    });
  });

  learnMenuButton.addEventListener("click", () => showLearn());
  quizMenuButton.addEventListener("click", () => showQuiz(false));
  document.getElementById("hero-start-quiz").addEventListener("click", () => showQuiz(true));
  document.getElementById("start-quiz").addEventListener("click", () => showQuiz(true));
  nextButton.addEventListener("click", () => {
    if (answered && questionIndex < TOTAL_QUESTIONS - 1) displayQuestion(questionIndex + 1);
  });
  finishButton.addEventListener("click", showResult);
  document.getElementById("retry-quiz").addEventListener("click", () => showQuiz(true));
  document.getElementById("back-to-learn").addEventListener("click", () => showLearn());

  resetQuizState();
  showLearn(false);
  lucide.createIcons();
</script>
 </body>
</html>
